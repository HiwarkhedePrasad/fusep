# ═══════════════════════════════════════════════════════════════════════
#  FuseViz Enterprise — Configuration File
# ═══════════════════════════════════════════════════════════════════════

[daemon]
# Listen address for WebSocket + REST API
listen = ":8080"

# SQLite database path
db_path = "/var/lib/fuseviz/events.db"

# Event buffer size (channel capacity)
buffer_size = 65536

# Batch size for SQLite writes
batch_size = 512

# Flush interval for SQLite (milliseconds)
flush_interval_ms = 500

[ebpf]
# Path to compiled eBPF object file
object_path = "/opt/fuseviz/ebpf/fuse_trace.bpf.o"

# Ring buffer size (bytes)
ring_buffer_size = 4194304

# Fallback to /dev/fuse proxy if eBPF unavailable
fallback_enabled = true

[security]
# Sliding window size (seconds)
window_size = 5

# Number of windows to track
window_count = 12

# Alert cooldown period (seconds)
cooldown_period = 30

# Ransomware detection thresholds
ransomware_write_threshold = 50
ransomware_unlink_threshold = 20

# Exfiltration detection thresholds
exfiltration_read_threshold = 200
exfiltration_bytes_threshold = 10485760  # 10MB

[ollama]
# Ollama API URL
url = "http://ollama:11434"

# Model to use for threat analysis
model = "llama3"

# Request timeout (seconds)
timeout = 30

[websocket]
# JWT secret for authentication
jwt_secret = "change-me-in-production"

# API key for simple auth
api_key = "fuseviz-dev-key"

# Maximum message size (bytes)
max_message_size = 65536

# Ping interval (seconds)
ping_interval = 30

# Write timeout (seconds)
write_timeout = 10
